version: '3.9'
services:
  app:
    container_name: devtracker_app
    build: .
    ports:
      - "8980:80"
    volumes:
      - ./src/public:/var/www/html
      - ./src/api:/var/www/api
      - devtracker_vendor:/var/www/api/vendor
    depends_on:
      - mysql
    env_file:
      - .env
    networks:
      - devtracker_net

  mysql:
    container_name: devtracker_mysql
    image: mysql:8
    ports:
      - "8981:3306"
    environment:
      MYSQL_DATABASE: devtracker
      MYSQL_USER: devtracker
      MYSQL_PASSWORD: devtracker
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - devtracker_mysql_data:/var/lib/mysql
    networks:
      - devtracker_net

networks:
  devtracker_net:
    name: devtracker_net

volumes:
  devtracker_mysql_data:
    name: devtracker_mysql_data
  devtracker_vendor:
    name: devtracker_vendor
