<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes
        AllowOverride All
        Require all granted
        # SPA fallback: anything not a real file serves index.html
        FallbackResource /index.html
    </Directory>

    # Route /api/* to the Slim app (outside document root)
    Alias /api /var/www/api/public

    <Directory /var/www/api/public>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
